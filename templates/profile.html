<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>البروفايل</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
<div class="login-box">
<h2>ملفي الشخصي</h2>
<img class="avatar" src="/static/uploads/{{ user.avatar }}" onerror="this.src='https://via.placeholder.com/90'">
<p>الاسم: {{ user.name }}</p>
<p>العمر: {{ user.age }}</p>
<p>الجنس: {{ user.gender }}</p>
<p>الحالة: {{ user.status }}</p>
<a class="btnlink" href="/chat">رجوع للشات</a>
</div>
</body>
</html>
